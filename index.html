<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Técnica de Adesivo e Primer</title>

<style>
body {
  font-family: Arial;
  background: #eef5ff;
  margin: 0;
}

.container {
  max-width: 900px;
  margin: 30px auto;
  background: #fff;
  border-radius: 15px;
  padding: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h1 {
  color: #0a2a66;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 10px 15px;
  border-radius: 8px;
  border: none;
  margin: 5px;
  cursor: pointer;
  font-weight: bold;
}

.btn {
  background: #1d4ed8;
  color: white;
}

.btn-green {
  background: #16a34a;
  color: white;
}

.btn-purple {
  background: #7c3aed;
  color: white;
}

.result {
  margin-top: 20px;
  padding: 15px;
  background: #f1f5f9;
  border-radius: 10px;
}

textarea {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
}

/* BOTÃO LINKTREE FIXO */
.linktree-btn {
  position: fixed;
  right: 20px;
  bottom: 20px;
  background: linear-gradient(135deg, #0a2a66, #1d4ed8);
  color: #fff;
  padding: 12px 18px;
  border-radius: 30px;
  font-weight: bold;
  text-decoration: none;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<div class="container">
<h1>Calculadora de Adesivo e Primer</h1>

<label>Bitola</label>
<select id="bitola">
<option value="">Selecione</option>
<option value="1">1"</option>
<option value="2">2"</option>
<option value="4">4"</option>
<option value="6">6"</option>
<option value="8">8"</option>
<option value="10">10"</option>
<option value="12">12"</option>
</select>

<label>Metros Lineares</label>
<input type="number" id="ml">

<label>Conexões</label>
<input type="number" id="conexoes">

<label>
<input type="checkbox" id="usarJuntas" onclick="toggleJuntas()"> Já sei o número de juntas
</label>

<div id="campoJuntas" style="display:none;">
<label>Total de juntas</label>
<input type="number" id="juntasManual">
</div>

<button class="btn" onclick="calcular()">Calcular</button>
<button class="btn" onclick="gerarTexto()">Gerar Texto</button>
<button class="btn-green" onclick="copiar()">Copiar</button>
<button class="btn-purple" onclick="window.print()">Exportar PDF</button>

<a id="whatsappBtn" class="btn-green" target="_blank">WhatsApp</a>

<div class="result" id="resultado"></div>

<textarea id="texto"></textarea>

</div>

<!-- BOTÃO LINKTREE -->
<a href="https://linktr.ee/patriciasilva_pead" target="_blank" class="linktree-btn">
📲 Contato e portfólio
</a>

<script>

const whatsappLink = "https://wa.me/5512978212800?text=Olá,%20usei%20sua%20calculadora%20e%20quero%20falar%20sobre%20o%20dimensionamento.";

document.getElementById("whatsappBtn").href = whatsappLink;

function toggleJuntas() {
  let check = document.getElementById("usarJuntas").checked;
  document.getElementById("campoJuntas").style.display = check ? "block" : "none";
}

function rendimento(bitola){
  if(bitola <=2) return 40;
  if(bitola <=4) return 25;
  if(bitola <=6) return 15;
  return 10;
}

function calcular(){

let bitola = parseFloat(document.getElementById("bitola").value);
let ml = parseFloat(document.getElementById("ml").value);
let conexoes = parseFloat(document.getElementById("conexoes").value);
let juntasManual = parseFloat(document.getElementById("juntasManual").value);
let usarJuntas = document.getElementById("usarJuntas").checked;

let juntas;

if(usarJuntas){
  juntas = juntasManual;
}else{
  let barras = Math.ceil(ml/6);
  let emendas = barras-1;
  juntas = emendas + conexoes;
}

let rend = rendimento(bitola);
let adesivo = Math.ceil((juntas/rend)*1.3);
let primer = adesivo;

let alerta = "";

if(bitola >= 8){
  alerta = "⚠️ Bitolas grandes possuem maior consumo por junta.";
}

document.getElementById("resultado").innerHTML = `
Juntas: ${juntas}<br>
Adesivo: ${adesivo} latas<br>
Primer: ${primer} latas<br>
${alerta}
`;

}

function gerarTexto(){

let juntas = document.getElementById("resultado").innerText;

let texto = `Dimensionamento realizado considerando ${juntas}, com margem de segurança para evitar falta de material em obra.`;

document.getElementById("texto").value = texto;

}

function copiar(){
let campo = document.getElementById("texto");
campo.select();
document.execCommand("copy");
alert("Copiado!");
}

</script>

</body>
</html>
